name: ai-board.specify
description: Evaluate /ai-board.specify on a representative feature description.

target:
  repo: /Users/b.fernandez/Workspace/ai-board
  # NOTE: .claude/commands/ in ai-board is a symlink to .claude-plugin/commands/ that
  # git does not track. Always target the canonical path under .claude-plugin/.
  prompt_file: .claude-plugin/commands/ai-board.specify.md
  invoke: "/ai-board.specify"

test_input:
  payload: |
    {
      "ticketKey": "TEST-001",
      "title": "Add CSV export for user data",
      "description": "Allow users to download their data as CSV from the settings page.",
      "clarificationPolicy": "AUTO"
    }

eval:
  runs_per_hypothesis: 3
  concurrency_per_hypothesis: 2
  max_hypotheses_per_round: 5

  level1_stability:
    output_artifact: "specs/{branch}/spec.md"
    embedding_model: mistral-embed
    threshold: 0.85

  level2_decisions:
    section_name: "Auto-Resolved Decisions"
    parser: structured_list
    # The actual generated prompt uses `**Decision**:` (singular line label),
    # not `**Decision summary**:`. Match what the model writes.
    decision_key: "Decision"
    threshold_pct: 95

  level3_quality:
    judge_model: claude-haiku-4-5
    double_blind: true
    rubric: |
      Compare two specs (A and B) generated from the same feature description.

      # Universal axes (apply to any prompt — see references/prompt-best-practices.md)
      - Clarity:           no vague preamble, no hedge language
      - Directness:        imperative instructions rather than open-ended questions
      - Output Guidelines: explicit constraints on length, structure, required elements
      - Process Steps:     when complex, numbered steps that meaningfully constrain the work
      - Specificity:       concrete bounds rather than generic phrasing
      - Structure:         semantic XML tags delimit sections cleanly
      - Examples:          if present, wrapped in <sample_input>/<ideal_output> with commentary
      - Robustness:        handles edge cases / missing fields / ambiguous input gracefully
      - Parameter Tuning:  numeric thresholds and defaults are well-calibrated for this case

      # Target-specific (ai-board.specify)
      - Relevance and defensibility of auto-resolved decisions
      - Coverage of user scenarios (primary + edge cases)
      - Testability of functional requirements
      - Absence of implementation details (no tech stack, no frameworks)
      - Right dosage of [NEEDS CLARIFICATION] markers (max 3, only critical)

      Decide: "A" | "B" | "tied". One-line rationale citing the strongest axis where the winner beats the loser.

limits:
  max_rounds: 5
  max_budget_usd: 50.0

mode: semi-auto

initial_hypotheses: []
